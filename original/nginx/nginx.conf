# SECURITY FINDING: HTTP only - no TLS (APSC-DV-002000 / NIST 800-52)
# SECURITY FINDING: server_tokens on - version disclosure
# SECURITY FINDING: No security headers
# SECURITY FINDING: Accepts all TLS versions if TLS were configured

events {
    worker_connections 1024;
}

http {
    # SECURITY FINDING: server_tokens not disabled (version in headers/error pages)
    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://flask_app:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # SECURITY FINDING: No proxy timeout limits
            # SECURITY FINDING: No request size limits
        }
    }
}
