{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-code">{{ code }}</div>
    <h1>{{ message }}</h1>
    <p>If the problem persists, contact your system administrator.</p>
    <a href="{{ url_for('index') }}" class="btn btn--primary">Return to Home</a>
</div>
{% endblock %}
