<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>{% block title %}OTP Messenger{% endblock %} — Secure OTP Platform</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="brand">
                <span class="brand-icon">&#9632;</span>
                <span class="brand-name">OTP Messenger</span>
                <span class="brand-tag">CLASSIFIED HANDLING TOOL</span>
            </div>
            <nav>
                <a href="{{ url_for('index') }}" class="nav-link">Home</a>
                <a href="{{ url_for('encrypt') }}" class="nav-link">Encrypt</a>
                <a href="{{ url_for('decrypt') }}" class="nav-link">Decrypt</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>OTP Messenger &mdash; Compliant with ASD STIG &amp; NIST SP 800-52 Rev 2</p>
            <p class="footer-warn">OFFICIAL USE ONLY &mdash; Key material must be distributed via a separate, approved secure channel.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
