# ─────────────────────────────────────────────────────────────────────────────
# OTP Messenger — Production Docker Compose
# Hardened per: ASD STIG, NIST SP 800-52 Rev 2, Container Platform SRG
# ─────────────────────────────────────────────────────────────────────────────

networks:
  # Isolated internal network — flask_app has no external port exposure
  otp_net:
    driver: bridge
    internal: false     # nginx requires outbound for OCSP resolver

services:

  # ── Flask / Gunicorn application ──────────────────────────────────────────
  flask_app:
    build:
      context: ./flask_app
      dockerfile: Dockerfile
    image: otp-flask:latest
    container_name: otp_flask
    restart: unless-stopped

    networks:
      - otp_net

    # NOT exposed to host — only reachable via nginx on otp_net
    # (Container Platform SRG: restrict network exposure)
    expose:
      - "5000"

    # Secrets and runtime config are loaded from .env (gitignored).
    # Copy .env.example to .env and populate before first run.
    # In production, inject these from a secrets manager (Vault, AWS SSM, etc.).
    env_file:
      - .env

    # Logs go to stdout/stderr; Docker's log driver persists them.
    # In production configure: --log-driver syslog|fluentd pointing at your SIEM.

    # Non-root user enforced in Dockerfile via USER directive (Container Platform SRG V-205072)

    # Read-only root filesystem — writable only for tmp
    # (Container Platform SRG V-205108)
    read_only: true
    tmpfs:
      - /tmp

    # Resource limits (DoS mitigation)
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          memory: 64M

    # Drop all Linux capabilities; add none back
    # (Container Platform SRG V-205070)
    cap_drop:
      - ALL

    # Prevent privilege escalation
    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Nginx ingress controller ──────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: otp-nginx:latest
    container_name: otp_nginx
    restart: unless-stopped

    networks:
      - otp_net

    ports:
      - "80:80"    # HTTP — immediately redirects to HTTPS (APSC-DV-002000)
      - "443:443"  # HTTPS — TLS 1.2/1.3 (NIST SP 800-52)

    volumes:
      # TLS certificate and key (read-only)
      - ./certs/server.crt:/etc/nginx/ssl/server.crt:ro
      - ./certs/server.key:/etc/nginx/ssl/server.key:ro
      - ./certs/dhparam.pem:/etc/nginx/ssl/dhparam.pem:ro
      # Nginx logs
      - nginx_logs:/var/log/nginx

    depends_on:
      flask_app:
        condition: service_healthy

    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # Bind to ports 80/443
      - CHOWN              # chown temp dirs to worker user (nginx uid 101)
      - SETGID             # Master process sets worker GID
      - SETUID             # Master process sets worker UID
      # Note: this is significantly reduced from Docker's default 14-capability set.
      # NET_RAW, MKNOD, SYS_CHROOT, AUDIT_WRITE, KILL, FOWNER, DAC_OVERRIDE,
      # FSETID, SETFCAP, SETPCAP are all dropped.

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD", "curl", "-skf", "https://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  nginx_logs:
    driver: local
