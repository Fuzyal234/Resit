# ─────────────────────────────────────────────────────────────────────────────
# Nginx Configuration — OTP Messenger
# TLS: NIST SP 800-52 Rev 2 compliant
# Security headers: ASD STIG (APSC-DV-000460, APSC-DV-000500)
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;

# Hide nginx version in Server header and error pages (information disclosure)
# ASD STIG / Web Server SRG V-214230
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    # ── Global hardening ────────────────────────────────────────────────────
    server_tokens off;                  # Suppress version in Server header & error pages
    # Note: complete Server header removal requires the headers-more module
    # (installed in Dockerfile via nginx-mod-headers-more).
    # With server_tokens off, the header is reduced to "nginx" with no version.

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ── Logging — APSC-DV-003000 / V-222430 ─────────────────────────────────
    # Fields: time, method, uri, status, bytes, referrer, UA, request_id, TLS version
    log_format  asd_stig
        '$time_iso8601 | $remote_addr | "$request" | '
        '$status | $body_bytes_sent | "$http_referer" | '
        '"$http_user_agent" | $ssl_protocol | $ssl_cipher';

    access_log  /var/log/nginx/access.log  asd_stig;

    # ── Request size limits (DoS mitigation) ────────────────────────────────
    client_max_body_size 64k;
    client_body_timeout  10s;
    client_header_timeout 10s;
    send_timeout         10s;

    # ── Rate limiting (per-IP) ───────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=otp_global:10m rate=30r/m;
    limit_req_zone  $binary_remote_addr zone=otp_api:10m    rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    limit_req_status  429;
    limit_conn_status 429;

    # ── TLS — NIST SP 800-52 Rev 2 ──────────────────────────────────────────
    # Section 3.3.1: SHALL support TLS 1.2; SHOULD support TLS 1.3
    # TLS 1.0 and TLS 1.1 SHALL NOT be used
    ssl_protocols TLSv1.2 TLSv1.3;

    # TLS 1.2 cipher suites — NIST SP 800-52 Rev 2 Table 3-3
    # All suites use ECDHE (Perfect Forward Secrecy) and AEAD modes.
    # No RC4, 3DES, DES, EXPORT, NULL, MD5, or SHA-1 based HMAC suites.
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256';

    # Server selects the strongest mutually supported cipher
    ssl_prefer_server_ciphers on;

    # DH parameters — 4096-bit for DHE key exchange (NIST SP 800-56A)
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    # Session cache (shared across workers; tickets disabled for strict PFS)
    ssl_session_cache   shared:SSL:20m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;     # Disabling tickets enforces PFS on every connection

    # OCSP Stapling — reduces client round-trips and improves privacy
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── HTTP → HTTPS redirect (TLS strictly enforced) ────────────────────────
    # APSC-DV-002000 / V-222596: application shall only be accessible via HTTPS
    server {
        listen 80;
        server_name _;

        # Redirect all HTTP to HTTPS permanently
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # ── Security headers ─────────────────────────────────────────────────
        # HSTS — instructs browsers to only use HTTPS for 1 year (APSC-DV-002000)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Clickjacking (APSC-DV-000460)
        add_header X-Frame-Options "DENY" always;

        # MIME sniffing prevention
        add_header X-Content-Type-Options "nosniff" always;

        # XSS filter (legacy browsers)
        add_header X-XSS-Protection "1; mode=block" always;

        # Content Security Policy (single-line — nginx requires one string argument)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

        # Referrer
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Permissions
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

        # Cache — prevent caching of OTP material
        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;

        # ── Connection & rate limits ─────────────────────────────────────────
        limit_conn addr 20;
        limit_req zone=otp_global burst=10 nodelay;

        # ── Proxy to Flask / Gunicorn ────────────────────────────────────────
        location / {
            limit_req zone=otp_global burst=10 nodelay;

            proxy_pass         http://flask_app:5000;
            proxy_http_version 1.1;

            # Strip and re-set hop-by-hop headers
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    30s;

            # Buffer tuning
            proxy_buffer_size        8k;
            proxy_buffers            8 8k;
            proxy_busy_buffers_size  16k;
        }

        # Tighter rate limit on write operations
        location ~ ^/(encrypt|decrypt)$ {
            limit_req zone=otp_api burst=5 nodelay;

            proxy_pass         http://flask_app:5000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    30s;
        }

        # Health check — no rate limit, no auth required
        location /health {
            proxy_pass         http://flask_app:5000/health;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            access_log off;
        }

        # Deny access to hidden files (.git, .env, etc.)
        location ~ /\. {
            deny all;
            return 404;
        }

        # Block common vulnerability scanners probing for PHP/ASP/etc.
        location ~* \.(php|asp|aspx|jsp|cgi)$ {
            return 404;
        }
    }
}
